<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Challenges - Fremont Fades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Poppins', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              },
            },
          },
        }
    </script>
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.min.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 antialiased font-sans">

<!-- Navigation Bar -->
<nav class="w-full bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href = '/';">
                <span class="text-xl font-black tracking-tighter">FREMONT FADES</span>
            </div>
            <!-- Nav Links -->
            <div class="flex items-center space-x-4">
                <a href="/dashboard.html" class="text-sm font-semibold text-gray-600 hover:text-black transition">Dashboard</a>
                <a href="#" class="text-sm font-semibold text-gray-600 hover:text-black transition">Fights</a>
                <a href="/challenges.html" class="text-sm font-semibold text-gray-600 hover:text-black transition">Challenges</a>
                <a href="#" class="text-sm font-semibold text-gray-600 hover:text-black transition">Credits</a>
                <span id="user-info" class="text-sm font-bold text-black ml-4"></span>
            </div>
        </div>
    </div>
</nav>

<main class="w-full">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <h1 class="text-4xl font-black tracking-tighter mb-8">Challenges</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Incoming Challenges -->
            <div id="incoming-challenges">
                <h2 class="text-3xl font-black tracking-tighter mb-4">Your Challenges</h2>
                <div class="bg-white rounded-lg shadow-sm p-4" id="challenges-list">
                    <p class="text-center text-gray-500">Loading challenges...</p>
                </div>
            </div>

            <!-- Challenge a Fighter -->
            <div id="challenge-fighter">
                <h2 class="text-3xl font-black tracking-tighter mb-4">Challenge a Fighter</h2>
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <input type="text" id="challenge-username" placeholder="Enter exact username..." class="w-full p-2 border border-gray-300 rounded-lg mb-4 text-black bg-white">
                    <button onclick="issueChallenge()" class="w-full mt-2 bg-black text-white font-semibold py-2 px-4 rounded-lg hover:bg-gray-800 transition shadow-md">Challenge User</button>
                </div>
            </div>
        </div>

        <!-- Find a Match -->
        <div id="quick-match" class="mt-8">
            <h2 class="text-3xl font-black tracking-tighter mb-4">Quick Match</h2>
            <div id="quick-match-container" class="bg-white rounded-lg shadow-sm p-4 text-center">
                <p class="text-gray-600 mb-4">Find a random opponent.</p>
                <button id="find-match-btn" class="bg-blue-500 text-white text-lg font-semibold px-8 py-4 rounded-xl hover:bg-blue-600 transition shadow-lg transform hover:-translate-y-1">
                    Find a Match
                </button>
                <div id="match-status" class="hidden mt-4">
                    <p class="text-lg font-semibold">Searching for an opponent...</p>
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mx-auto mt-4"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const username = localStorage.getItem('username');
        if (!username) {
            window.location.href = '/';
            return;
        }
        document.getElementById('user-info').textContent = `Welcome, ${username}`;

        loadChallenges(username);

        const findMatchBtn = document.getElementById('find-match-btn');
        const matchStatus = document.getElementById('match-status');
        const quickMatchContainer = document.getElementById('quick-match-container');

        findMatchBtn.addEventListener('click', () => {
            findMatchBtn.classList.add('hidden');
            quickMatchContainer.querySelector('p').classList.add('hidden');
            matchStatus.classList.remove('hidden');

            // Simulate finding a match
            setTimeout(() => {
                matchStatus.innerHTML = '<p class="text-lg font-semibold text-green-500">Opponent Found!</p>';
            }, 5000);
        });
    });

    function loadChallenges(username) {
        fetch(`/api/fights/challenges/${username}`)
            .then(res => res.json())
            .then(challenges => {
                const list = document.getElementById('challenges-list');
                if (challenges.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-500">No challenges.</p>';
                    return;
                }

                list.innerHTML = challenges.map(c => `
                    <div class="p-4 border-b border-gray-200 bg-gray-50 rounded mb-2">
                        <p class="font-bold text-lg">${c.challenger} vs ${c.challenged}</p>
                        <p class="text-sm text-gray-600 mb-2">Status: <span class="font-semibold">${c.status}</span></p>

                        ${c.status === 'PENDING' && c.challenged === username ? `
                            <div class="flex gap-2 mt-2">
                                <button onclick="respondChallenge('${c.id}', 'accept')" class="bg-green-500 text-white px-3 py-1 rounded text-sm hover:bg-green-600 transition shadow">Accept</button>
                                <button onclick="respondChallenge('${c.id}', 'reject')" class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600 transition shadow">Decline</button>
                            </div>
                        ` : ''}

                        ${(c.status === 'ACCEPTED' || c.status === 'LOCATION_PROPOSED') ? `
                            <div class="mt-4 border-t pt-2">
                                <h4 class="font-bold text-sm mb-1">Proposed Location & Time</h4>
                                ${c.locationProposer ? `<p class="text-xs text-gray-500">Proposed by: ${c.locationProposer}</p>` : ''}
                                ${c.proposedLocation ? `<p class="text-sm">Location: ${c.proposedLocation}</p><p class="text-sm">Time: ${new Date(c.proposedTime).toLocaleString()}</p>` : '<p class="text-sm italic">None yet</p>'}

                                <div class="mt-2 flex flex-col gap-2">
                                    <input type="text" id="loc-${c.id}" placeholder="Location" class="border p-1 text-sm bg-white text-black rounded">
                                    <input type="datetime-local" id="time-${c.id}" class="border p-1 text-sm bg-white text-black rounded">
                                    <button onclick="proposeLocation('${c.id}')" class="bg-blue-500 text-white px-2 py-1 rounded text-sm shadow hover:bg-blue-600 transition">Propose/Update</button>
                                </div>

                                ${c.status === 'LOCATION_PROPOSED' && c.locationProposer !== username ? `
                                    <button onclick="agreeLocation('${c.id}')" class="mt-2 w-full bg-green-500 text-white px-2 py-2 rounded text-sm shadow hover:bg-green-600 transition font-bold">AGREE & SCHEDULE FIGHT</button>
                                ` : ''}
                            </div>
                        ` : ''}

                        ${c.status !== 'PENDING' && c.status !== 'REJECTED' ? `
                            <div class="mt-4 border-t pt-2 h-32 overflow-y-auto bg-white p-2 border rounded" id="chat-${c.id}">
                                ${c.chatMessages.map(m => `<p class="text-xs"><span class="font-bold">${m.split(': ')[0]}:</span> ${m.split(': ').slice(1).join(': ')}</p>`).join('')}
                            </div>
                            <div class="flex gap-2 mt-2">
                                <input type="text" id="msg-${c.id}" placeholder="Message..." class="flex-1 border p-1 text-sm bg-white text-black rounded">
                                <button onclick="sendMessage('${c.id}')" class="bg-gray-800 text-white px-3 py-1 rounded text-sm shadow hover:bg-black transition">Send</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            });
    }

    function issueChallenge() {
        const challenged = document.getElementById('challenge-username').value;
        const challenger = localStorage.getItem('username');
        if (!challenged) return alert('Enter a username');

        fetch('/api/fights/challenges', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ challenger, challenged })
        }).then(res => {
            if(res.ok) {
                alert('Challenge sent!');
                loadChallenges(challenger);
            } else {
                alert('Failed to send challenge. Verify username.');
            }
        });
    }

    function respondChallenge(id, action) {
        fetch(`/api/fights/challenges/${id}/${action}`, { method: 'POST' })
            .then(() => loadChallenges(localStorage.getItem('username')));
    }

    function proposeLocation(id) {
        const loc = document.getElementById(`loc-${id}`).value;
        const time = document.getElementById(`time-${id}`).value;
        if (!loc || !time) return alert('Fill both location and time');

        fetch(`/api/fights/challenges/${id}/proposeLocation`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ location: loc, time: time, username: localStorage.getItem('username') })
        }).then(() => loadChallenges(localStorage.getItem('username')));
    }

    function agreeLocation(id) {
        fetch(`/api/fights/challenges/${id}/agreeLocation`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: localStorage.getItem('username') })
        }).then(res => {
            if (res.ok) {
                alert('Fight scheduled! Check your dashboard.');
                window.location.href = '/dashboard.html';
            } else {
                alert('Failed to agree');
            }
        });
    }

    function sendMessage(id) {
        const msg = document.getElementById(`msg-${id}`).value;
        if (!msg) return;

        fetch(`/api/fights/challenges/${id}/chat`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sender: localStorage.getItem('username'), message: msg })
        }).then(() => {
            loadChallenges(localStorage.getItem('username'));
        });
    }
</script>

</body>
</html>
